<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> מטאורולוגיה - יהודה</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-default">

    <div class="main-section">
        <div class="date-container" id="date-display">
            </div>
        <div class="main-title">מחוז יהודה</div>
        
        <div class="main-metrics">
            <div class="metric">
                <div class="metric-value" id="judea-wind">- קמ"ש</div>
                <div class="metric-label">מהירות רוח</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="judea-humidity">-%</div>
                <div class="metric-label">לחות</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="judea-wind-dir">-</div>
                <div class="metric-label">כיוון רוח</div>
            </div>
            <div class="metric">
                <div class="metric-value fire-risk" id="judea-fire-risk">-</div>
                <div class="metric-label">סיכון שריפות</div>
            </div>
        </div>
    </div>

    <div class="bottom-section" id="other-cities">
        </div>

    <div id="lapid-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">🚨 התראת מערכת לפיד 🚨</span>
                <button class="close-btn" onclick="closeLapidAlert()">&times;</button>
            </div>
            <div class="modal-body" id="lapid-event-details">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
